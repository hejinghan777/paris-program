name = "paris-study-guide"
main = "src/index.js"
compatibility_date = "2026-07-23"
compatibility_flags = ["nodejs_compat"]

[vars]
ALLOWED_ORIGIN = "https://hejinghan777.github.io"
WORKERS_AI_MODEL = "@cf/meta/llama-3.3-70b-instruct-fp8-fast"

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "paris-study-guide-admin"
database_id = "018d321e-58cb-4e2e-9da3-f1d44d6a5285"
migrations_dir = "migrations"

[observability]
enabled = true
head_sampling_rate = 1
